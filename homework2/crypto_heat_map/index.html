<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Heat Map (D3)</title>

  <!-- Materialize -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"/>

  <!-- D3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<nav class="blue-grey darken-3">
  <div class="nav-wrapper container">
    <a class="brand-logo" href="index.html">Crypto Heat Map</a>
  </div>
</nav>

<div class="container section">
  <div class="row">
    <div class="col s12 m8">
      <div class="card">
        <div class="card-content">
          <span class="card-title">Heat Map (Treemap)</span>
          <p class="small-note">
            Size = market cap. Color = 24h change. Hover for tooltip, click for details.
          </p>

          <div class="controls row">
            <div class="input-field col s12 m6">
              <input id="searchInput" type="text" placeholder="Filter by name or symbol (e.g., btc, eth)">
              <label for="searchInput" class="active">Filter</label>
            </div>

            <div class="input-field col s12 m3">
              <select id="topSelect">
                <option value="25">Top 25</option>
                <option value="50" selected>Top 50</option>
                <option value="100">Top 100</option>
              </select>
              <label>Coins</label>
            </div>

            <div class="input-field col s12 m3">
              <button id="refreshBtn" class="btn blue-grey darken-2 waves-effect waves-light" style="width:100%;">
                Refresh
              </button>
            </div>
          </div>

          <div id="status" class="chip blue-grey lighten-4">Loading…</div>

          <div id="chartWrap">
            <svg id="chart"></svg>
            <div id="tooltip" class="tooltip"></div>
          </div>

          <div class="legend">
            <div class="legend-item"><span class="swatch neg"></span> Negative</div>
            <div class="legend-item"><span class="swatch neutral"></span> ~0%</div>
            <div class="legend-item"><span class="swatch pos"></span> Positive</div>
          </div>

        </div>
      </div>
    </div>

    <div class="col s12 m4">
      <div class="card" id="detailCard">
        <div class="card-content">
          <span class="card-title" id="detailTitle">Select a coin</span>

          <div class="logo-wrap">
            <img id="detailImg" alt="logo" src="" />
          </div>

          <div id="detailBody" class="detail-body">
            <p class="small-note">Click a tile to see details here.</p>
          </div>
        </div>
        <div class="card-action">
          <span id="detailNote" class="grey-text text-darken-1"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Materialize JS (for select dropdown) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

<script src="app.js"></script>
</body>
</html>
