<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dog Breeds Gallery</title>

  <!-- Materialize CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"/>

  <!-- Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>

  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<nav class="blue-grey darken-3">
  <div class="nav-wrapper container">
    <a class="brand-logo" href="#!">Dog API</a>
  </div>
</nav>

<div class="container section">

  <div class="row">
    <div class="input-field col s12">
      <i class="material-icons prefix">search</i>
      <input id="filterInput" type="text" placeholder="Type a breed (e.g., husky, hound, bulldog)">
      <label for="filterInput" class="active">Filter breeds</label>
    </div>
  </div>

  <div class="row">
    <div class="col s12">
      <div id="status" class="status-card card blue-grey lighten-5">
        <div class="card-content">
          <span class="card-title">Loading…</span>
          <p id="statusText">Fetching breed list and images.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="cardsRow" class="row"></div>

</div>

<!-- Materialize JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script src="app.js"></script>
</body>
</html>
